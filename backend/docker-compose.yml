services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bidding
      POSTGRES_PASSWORD: bidding
      POSTGRES_DB: bidding
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidding"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
